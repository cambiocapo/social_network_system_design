openapi: 3.0.4
info:
  title: Traveller Social Network
  description: An API for TSN.
  version: 0.0.1
servers:
  - url: http://localhost:8080/api/v1
    description: Development server
paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
  /users/{UserId}:
    get:
      tags:
        - User
      summary: Get user by Id
      operationId: getUserById
      parameters:
        - in: path
          name: UserId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      responses:
        '200':
          description: User by Id
          content:
            application/json:
              schema:
                type: integer
    post:
      tags:
        - User
      summary: Add new user
      operationId: addUser
      parameters:
        - in: path
          name: UserId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
      responses:
        '201':
          description: New user was added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUser'
        '400':
          description: Invalid input
    delete:
      tags:
        - User
      summary: Delete user by id
      operationId: deleteUser
      parameters:
        - name: UserId
          in: path
          description: ID of the user to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
  /followers/{userId}:
    get:
      tags:
        - Followers
      summary: Get all followers of the user
      operationId: getAllFollowers
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      responses:
        '200':
          description: A list of followers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
    post:
      tags:
        - Followers
      summary: Add new follower
      operationId: addFollower
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
      responses:
        '201':
          description: Follower was added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Follower'
        '400':
          description: Invalid input
    delete:
      tags:
        - Followers
      summary: Delete followers of the user by id
      operationId: deleteFollower
      parameters:
        - name: userId
          in: path
          description: ID of the follower to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Follower deleted successfully
        '404':
          description: User not found
  /followee/{userId}:
    get:
      tags:
        - Followee
      summary: Get all followee of the user
      operationId: getAllFollowee
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      responses:
        '200':
          description: A list of followee
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
    post:
      tags:
        - Followee
      summary: Add new followee
      operationId: addFollowee
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
      responses:
        '201':
          description: Followee was added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Followee'
        '400':
          description: Invalid input
    delete:
      tags:
        - Followee
      summary: Delete followee of the user by id
      operationId: deleteFollowee
      parameters:
        - name: userId
          in: path
          description: ID of the followee to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
  /posts/{userId}:
    get:
      tags:
        - Posts
      summary: Get all posts
      operationId: getAllPosts
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve posts of
      responses:
        '200':
          description: A list of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      tags:
        - Posts
      summary: Create a new post
      operationId: createPost
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: ID of the user to who create post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
    delete:
      tags:
        - Posts
      summary: Delete post of the user by id
      operationId: deletePost
      parameters:
        - name: userId
          in: path
          description: ID of the post to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Post deleted successfully
        '404':
          description: Post not found
  /posts/comments/{PostId}:
    get:
      tags:
        - Comments
      summary: Get comments for the post
      operationId: getAllComments
      parameters:
        - in: path
          name: PostId
          schema:
            type: integer
          required: true
          description: ID of the user to retrieve
      responses:
        '200':
          description: A list of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
    post:
      tags:
        - Comments
      summary: Create a new comment
      operationId: createComment
      parameters:
        - in: path
          name: PostId
          schema:
            type: integer
          required: true
          description: ID of the post to retrieve comments of
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Invalid input
    delete:
      tags:
        - Comments
      summary: Delete comment of the user by id
      operationId: deleteComment
      parameters:
        - name: PostId
          in: path
          description: ID of the comment to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Comment deleted successfully
        '404':
          description: Comment not found
components:
  schemas:
    Followee:
      type: array
      items: 
        type: integer 
    Follower:
      type: array
      items:
        type: integer
    Post:
      type: object
      properties:
        id:
          type: integer
          format: uuid
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        name:
          type: string
          example: "Euro trip"
        description:
          type: string
          format: text
          example: "description of the voyage"
    Comment:
      type: object
      properties:
        id:
          type: integer
          format: uuid
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        content:
          type: string
          format: text
          example: "comment"
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@google.com"
    NewUser:
      type: object
      properties:
        name:
          type: string
          example: "Allan Hugues"
        email:
          type: string
          format: email
          example: "allan.hugues@gmail.com"
      required:
        - name
        - email
